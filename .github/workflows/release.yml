# SPDX-License-Identifier: AGPL-3.0-or-later
# Release lane (Stage D / E). Tag-triggered. Windows desktop + PWA is the beta
# target; macOS/Linux/Android builds are deferred (roadmap — see SCOPE OUT).
# EVERY action is SHA-pinned. Node 22. The goose 1.41.0 sidecar is downloaded and
# staged in-workflow (pinned by version), so the bundle ships the real harness AND
# the live-goose trio actually executes here (Windows runner) — unlike ci.yml.
# Signing is guarded: the pipeline builds UNSIGNED when signing secrets are absent.
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dryRunTag:
        description: >-
          Tag name for a draft dry-run release (e.g. v0.0.0-dryrun.1). Leave empty
          for a build-only run (no release, artifacts only). Draft releases create
          no git tag until published; delete the draft after inspection.
        required: false
        default: ''

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  GOOSE_VERSION: '1.41.0'

jobs:
  build-windows:
    runs-on: windows-latest
    # contents: write — tauri-action creates the DRAFT release natively on tag
    # runs (and dispatch dry-runs with dryRunTag): it is the only step that
    # generates latest.json and uploads the updater .sig files alongside the
    # installers. Publishing the draft remains a human action, always.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Download the pinned goose CLI and stage it as the sidecar. Version-pinned
      # via GOOSE_VERSION; stage:goose hard-fails (--require) if it is missing, so
      # a release can never silently ship without the harness.
      - name: Install + stage goose ${{ env.GOOSE_VERSION }} sidecar
        shell: pwsh
        run: |
          $env:GOOSE_VERSION = "${{ env.GOOSE_VERSION }}"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/aaif-goose/goose/main/download_cli.ps1" -OutFile "download_cli.ps1"
          $env:CONFIGURE = "false"
          ./download_cli.ps1
          $env:GOOSE_BIN = "$env:USERPROFILE\.local\bin\goose.exe"
          "GOOSE_BIN=$env:GOOSE_BIN" | Out-File -FilePath $env:GITHUB_ENV -Append
          npm run stage:goose -- --require

      # Gate the release on tests. On this Windows runner WITH the sidecar staged,
      # the live-goose trio EXECUTES (permission-startup / acp-handshake /
      # recipes.live) — the release lane is where goose behavior is proven in CI.
      - name: Tests (incl. live-goose trio)
        run: npm run test

      # F18: the release body ships to testers twice — on the release page and
      # inside the in-app update dialog (latest.json embeds it as `notes`). Read
      # docs/beta/RELEASE-NOTES-<tag>.md when it exists; otherwise a short
      # honest fallback. Never the lane boilerplate again.
      - name: Compose tester-facing release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "${GITHUB_REF##refs/tags/*}" ] && [ -f "docs/beta/RELEASE-NOTES-${TAG}.md" ]; then
            BODY="$(cat "docs/beta/RELEASE-NOTES-${TAG}.md")"
          else
            BODY="Alfred beta build ${TAG:-'(dry run)'}. Updates arrive inside the app (Settings → About → Check for updates). Known issues: https://github.com/MartinMontero/Alfred/blob/main/docs/beta/known-issues.md"
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (signed only if secrets present)
        uses: tauri-apps/tauri-action@42e9df6c59070d114bf90dcd3943a1b8f138b113 # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — when unset, tauri-action builds unsigned (beta-acceptable),
          # but createUpdaterArtifacts requires the key: the W5 dry-run acceptance is
          # .sig files + latest.json actually emitted, so the keypair ceremony precedes
          # any release run (docs/release-process.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc
          # Native release mode: on tag runs (and dispatch dry-runs that set
          # dryRunTag), tauri-action creates the draft release itself and is the
          # ONLY generator of latest.json; it also uploads installers + .sig.
          # With no tag and no dryRunTag the step builds only (no release).
          # The previous hand-rolled release job collected *.msi/*.exe only —
          # no .sig, no latest.json — which would have 404'd every installed
          # updater; removed in favor of this.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
          releaseDraft: true
          releaseBody: ${{ steps.notes.outputs.body }}
          includeUpdaterJson: true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: alfred-windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          if-no-files-found: error
