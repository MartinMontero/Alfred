# SPDX-License-Identifier: AGPL-3.0-or-later
# Release lane (Stage D / E). Tag-triggered. Windows desktop + PWA is the beta
# target; macOS/Linux/Android builds are deferred (roadmap — see SCOPE OUT).
# EVERY action is SHA-pinned. Node 22. The goose 1.41.0 sidecar is downloaded and
# staged in-workflow (pinned by version), so the bundle ships the real harness AND
# the live-goose trio actually executes here (Windows runner) — unlike ci.yml.
# Signing is guarded: the pipeline builds UNSIGNED when signing secrets are absent.
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a draft release'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  GOOSE_VERSION: '1.41.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Download the pinned goose CLI and stage it as the sidecar. Version-pinned
      # via GOOSE_VERSION; stage:goose hard-fails (--require) if it is missing, so
      # a release can never silently ship without the harness.
      - name: Install + stage goose ${{ env.GOOSE_VERSION }} sidecar
        shell: pwsh
        run: |
          $env:GOOSE_VERSION = "${{ env.GOOSE_VERSION }}"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/aaif-goose/goose/main/download_cli.ps1" -OutFile "download_cli.ps1"
          $env:CONFIGURE = "false"
          ./download_cli.ps1
          $env:GOOSE_BIN = "$env:USERPROFILE\.local\bin\goose.exe"
          "GOOSE_BIN=$env:GOOSE_BIN" | Out-File -FilePath $env:GITHUB_ENV -Append
          npm run stage:goose -- --require

      # Gate the release on tests. On this Windows runner WITH the sidecar staged,
      # the live-goose trio EXECUTES (permission-startup / acp-handshake /
      # recipes.live) — the release lane is where goose behavior is proven in CI.
      - name: Tests (incl. live-goose trio)
        run: npm run test

      - name: Build Tauri app (signed only if secrets present)
        uses: tauri-apps/tauri-action@42e9df6c59070d114bf90dcd3943a1b8f138b113 # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — when unset, tauri-action builds unsigned (beta-acceptable).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: alfred-windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create draft release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: release/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
