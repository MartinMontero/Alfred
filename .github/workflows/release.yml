# SPDX-License-Identifier: AGPL-3.0-or-later
# Release lane (Stage D / E). Tag-triggered. Windows desktop + PWA is the beta
# target; macOS/Linux/Android builds are deferred (roadmap — see SCOPE OUT).
# EVERY action is SHA-pinned. Node 22. The goose 1.43.0 sidecar is downloaded and
# staged in-workflow (pinned by version), so the bundle ships the real harness AND
# the live-goose trio actually executes here (Windows runner) — unlike ci.yml.
# Signing is guarded: the pipeline builds UNSIGNED when signing secrets are absent.
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dryRunTag:
        description: >-
          Tag name for a draft dry-run release (e.g. v0.0.0-dryrun.1). Leave empty
          for a build-only run (no release, artifacts only). Draft releases create
          no git tag until published; delete the draft after inspection.
        required: false
        default: ''

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  GOOSE_VERSION: '1.43.0'

jobs:
  build-windows:
    runs-on: windows-latest
    # contents: write — tauri-action creates the DRAFT release natively on tag
    # runs (and dispatch dry-runs with dryRunTag): it is the only step that
    # generates latest.json and uploads the updater .sig files alongside the
    # installers. Publishing the draft remains a human action, always.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Download the pinned goose CLI and stage it as the sidecar. Version-pinned
      # via GOOSE_VERSION; stage:goose hard-fails (--require) if it is missing, so
      # a release can never silently ship without the harness.
      - name: Install + stage goose ${{ env.GOOSE_VERSION }} sidecar
        shell: pwsh
        run: |
          $env:GOOSE_VERSION = "${{ env.GOOSE_VERSION }}"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/aaif-goose/goose/main/download_cli.ps1" -OutFile "download_cli.ps1"
          $env:CONFIGURE = "false"
          ./download_cli.ps1
          $env:GOOSE_BIN = "$env:USERPROFILE\.local\bin\goose.exe"
          "GOOSE_BIN=$env:GOOSE_BIN" | Out-File -FilePath $env:GITHUB_ENV -Append
          npm run stage:goose -- --require

      # Gate the release on tests. On this Windows runner WITH the sidecar staged,
      # the live-goose recipe test EXECUTES (recipes.live) — the release lane is
      # where goose behavior is proven in CI. NOTE (ADR-0008): permission-startup
      # and acp-handshake were retired with the TS policy layer; goose spawning
      # moved into the compiled guard (holmes-guard), whose spawn/env behavior is
      # covered by src-tauri guard_tests + the Linux artifact-guard job (ci.yml).
      # Wiring the full WebDriver artifact probe to this Windows artifact
      # (msedgedriver + sidecar placement next to the raw exe) is the ledgered
      # follow-up in LOOP-INTEGRATION.md, Track 2 (flag 3 platform honesty).
      - name: Tests (incl. live-goose recipe validation)
        run: npm run test

      # F18: the release body ships to testers twice — on the release page and
      # inside the in-app update dialog (latest.json embeds it as `notes`). Read
      # docs/beta/RELEASE-NOTES-<tag>.md when it exists; otherwise a short
      # honest fallback. Never the lane boilerplate again.
      - name: Compose tester-facing release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "${GITHUB_REF##refs/tags/*}" ] && [ -f "docs/beta/RELEASE-NOTES-${TAG}.md" ]; then
            BODY="$(cat "docs/beta/RELEASE-NOTES-${TAG}.md")"
          else
            BODY="Alfred beta build ${TAG:-'(dry run)'}. Updates arrive inside the app (Settings → About → Check for updates). Known issues: https://github.com/MartinMontero/Alfred/blob/main/docs/beta/known-issues.md"
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (signed only if secrets present)
        uses: tauri-apps/tauri-action@42e9df6c59070d114bf90dcd3943a1b8f138b113 # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — when unset, tauri-action builds unsigned (beta-acceptable),
          # but createUpdaterArtifacts requires the key: the W5 dry-run acceptance is
          # .sig files + latest.json actually emitted, so the keypair ceremony precedes
          # any release run (docs/release-process.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc
          # Native release mode: on tag runs (and dispatch dry-runs that set
          # dryRunTag), tauri-action creates the draft release itself and is the
          # ONLY generator of latest.json; it also uploads installers + .sig.
          # With no tag and no dryRunTag the step builds only (no release).
          # The previous hand-rolled release job collected *.msi/*.exe only —
          # no .sig, no latest.json — which would have 404'd every installed
          # updater; removed in favor of this.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
          releaseDraft: true
          releaseBody: ${{ steps.notes.outputs.body }}
          includeUpdaterJson: true

      # ADR-0009: author the updater feed ourselves, per installer type.
      # tauri-action's latest.json carries ONE plain windows-x86_64 key and,
      # with both bundles present, points it at the MSI (updaterJsonPreferNsis
      # defaults false at v0.5.20). The plugin probes {os}-{arch}-{installer}
      # FIRST (updater-v2.10.1 updater.rs:578-587), and an NSIS per-user
      # install fed an MSI runs msiexec blind — the beta.2→beta.3 defect. This
      # step REPLACES the asset with a feed built from THIS run's artifacts:
      # nsis + msi keys, plain-key fallback = nsis. Never merged from a
      # previous release, so stale entries cannot be inherited.
      - name: Author per-installer updater feed (nsis + msi keys)
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.dryRunTag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          set -euo pipefail
          BUNDLE=src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          NSIS=$(ls "$BUNDLE"/nsis/*-setup.exe)
          MSI=$(ls "$BUNDLE"/msi/*.msi)
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          printf '%s' "$NOTES" > notes.txt
          node scripts/updater-feed.mjs build \
            --tag "$TAG" --repo "$GITHUB_REPOSITORY" --version "$VERSION" \
            --nsis "$NSIS" --msi "$MSI" --notes-file notes.txt --out latest.json
          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::No release (draft or published) found for tag $TAG"; exit 1
          fi
          ASSET_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
            --jq '.[] | select(.name=="latest.json") | .id' | head -1)
          if [ -n "$ASSET_ID" ]; then
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID"
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=latest.json" > /dev/null
          echo "Replaced latest.json on release $RELEASE_ID with per-installer feed."

      # Regression gate (the beta.3 class can never ship silently again):
      # download the feed BACK from the release — proving what testers'
      # updaters will actually receive — and verify every key points at THIS
      # tag's artifacts with the matching local signatures. Hard fail.
      - name: Verify updater feed on the release (regression gate)
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.dryRunTag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.dryRunTag }}
        run: |
          set -euo pipefail
          BUNDLE=src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          NSIS=$(ls "$BUNDLE"/nsis/*-setup.exe)
          MSI=$(ls "$BUNDLE"/msi/*.msi)
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          ASSET_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
            --jq '.[] | select(.name=="latest.json") | .id' | head -1)
          if [ -z "$ASSET_ID" ]; then
            echo "::error::latest.json missing from release $RELEASE_ID"; exit 1
          fi
          curl -sfL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            -o feed-from-release.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID"
          node scripts/updater-feed.mjs verify \
            --in feed-from-release.json \
            --tag "$TAG" --version "$VERSION" --nsis "$NSIS" --msi "$MSI"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: alfred-windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          if-no-files-found: error
