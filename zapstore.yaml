name: Alfred
summary: Sovereign, local-first, Nostr-native PKM for agentic AI development
description: |
  Alfred is the sovereign, local-first, Nostr-native Personal Knowledge
  Management system for agentic AI development — a component of
  wecanjustbuildthings.dev. Your notes are plain markdown on your own disk,
  encrypted with your keys before any relay; no server, no company, no third
  party can read your content.

  Features:
  - End-to-end encrypted notes using Nostr (NIP-44)
  - Local-first plain-markdown vault that works offline
  - Cross-platform desktop (Windows first) and a zero-backend PWA
  - Self-custodial — you own your code, your data, and your keys
license: AGPL-3.0-or-later
repository: https://github.com/MartinMontero/Alfred
